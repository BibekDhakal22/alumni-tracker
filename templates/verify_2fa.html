<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <title>Verify 2FA — Alumni Tracker</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    body {
      background: linear-gradient(135deg,#0f172a 0%,#1e1b4b 50%,#0f172a 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .verify-wrap { width: 100%; max-width: 400px; padding: 24px; }
    .verify-card {
      background: rgba(255,255,255,0.05); backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 32px;
    }
    .verify-icon {
      text-align: center; font-size: 48px; margin-bottom: 16px;
    }
    .verify-title {
      text-align: center; color: white; font-size: 22px;
      font-weight: 700; margin-bottom: 8px;
    }
    .verify-sub {
      text-align: center; color: #94a3b8; font-size: 14px; margin-bottom: 24px;
    }
    .code-input {
      width: 100%; padding: 16px; background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(255,255,255,0.1); border-radius: 12px;
      font-size: 24px; color: white; text-align: center; letter-spacing: 10px;
      outline: none; font-family: monospace; margin-bottom: 16px;
      transition: border-color 0.2s;
    }
    .code-input:focus { border-color: #6366f1; }
    .verify-btn {
      width: 100%; padding: 13px; background: linear-gradient(135deg,#6366f1,#4f46e5);
      color: white; border: none; border-radius: 10px; font-size: 15px;
      font-weight: 600; cursor: pointer; margin-bottom: 12px;
    }
    .back-link {
      display: block; text-align: center; color: #64748b; font-size: 13px;
      text-decoration: none; margin-top: 8px;
    }
    .back-link:hover { color: #94a3b8; }
    .alert-error {
      background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5; padding: 10px 14px; border-radius: 10px;
      font-size: 13px; margin-bottom: 16px; text-align: center;
    }
  </style>
</head>
<body>
  <div class="verify-wrap">
    <div class="verify-card">
      <div class="verify-icon">🔐</div>
      <div class="verify-title">Two-Factor Authentication</div>
      <div class="verify-sub">
        Enter the 6-digit code from your authenticator app for
        <strong style="color:white;">{{ student.full_name }}</strong>
      </div>

      {% with messages = get_flashed_messages() %}
        {% if messages %}{% for m in messages %}
          <div class="alert-error">{{ m }}</div>
        {% endfor %}{% endif %}
      {% endwith %}

      <form method="POST">
        <input type="text" name="code" class="code-input"
               placeholder="000000" maxlength="6"
               pattern="[0-9]{6}" autofocus required>
        <button type="submit" class="verify-btn">✅ Verify</button>
      </form>
      <a href="/login" class="back-link">← Back to Login</a>
    </div>
  </div>
  <script src="/static/js/main.js"></script>
</body>
</html>
