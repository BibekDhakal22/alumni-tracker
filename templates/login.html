<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alumni Tracker — Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      min-height: 100vh;
      background: #f0f4f8;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }

    .logo h1 {
      font-size: 22px;
      font-weight: 600;
      color: #1a1a2e;
    }

    .logo p {
      font-size: 13px;
      color: #888;
      margin-top: 4px;
    }

    .divider {
      border: none;
      border-top: 1px solid #f0f0f0;
      margin-bottom: 24px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #444;
      margin-bottom: 6px;
    }

    input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      color: #1a1a2e;
      margin-bottom: 16px;
      transition: border-color 0.2s;
      outline: none;
    }

    input:focus { border-color: #4f46e5; }

    button {
      width: 100%;
      padding: 12px;
      background: #4f46e5;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #4338ca; }

    .alert {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: #dc2626;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      color: #aaa;
      margin-top: 24px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>🎓 Alumni Tracker</h1>
      <p>TU Affiliated College — BCA Department</p>
    </div>
    <hr class="divider">

    {% with messages = get_flashed_messages() %}
      {% if messages %}
        {% for message in messages %}
          <div class="alert">{{ message }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST">
      <label>Student ID</label>
      <input type="text" name="student_id" placeholder="e.g. BCA2020001" required>

      <label>Phone Number (Password)</label>
      <input type="password" name="phone" placeholder="Your registered phone number" required>

      <button type="submit">Login</button>
    </form>

    <div class="footer">
      Use your Student ID and registered phone number to login
    </div>
  </div>
</body>
</html>
