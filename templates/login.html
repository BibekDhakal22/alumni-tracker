<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alumni Tracker — Login</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <style>
    body {
      background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .login-wrap {
      width: 100%; max-width: 420px; padding: 24px;
    }
    .login-brand {
      text-align: center; margin-bottom: 32px;
    }
    .login-brand .icon {
      width: 64px; height: 64px; background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 18px; display: flex; align-items: center; justify-content: center;
      font-size: 30px; margin: 0 auto 14px;
      box-shadow: 0 8px 24px rgba(99,102,241,0.4);
    }
    .login-brand h1 { color: #fff; font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
    .login-brand p  { color: #94a3b8; font-size: 14px; margin-top: 4px; }
    .login-card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px; padding: 32px;
    }
    .login-card label {
      display: block; font-size: 12px; font-weight: 600;
      color: #94a3b8; margin-bottom: 8px;
      text-transform: uppercase; letter-spacing: 0.6px;
    }
    .login-card input {
      width: 100%; padding: 12px 16px;
      background: rgba(255,255,255,0.07);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 10px; font-size: 14px; color: #fff;
      outline: none; margin-bottom: 18px;
      transition: border-color 0.2s, background 0.2s;
    }
    .login-card input::placeholder { color: #475569; }
    .login-card input:focus {
      border-color: #6366f1;
      background: rgba(99,102,241,0.1);
    }
    .login-btn {
      width: 100%; padding: 13px;
      background: linear-gradient(135deg, #6366f1, #4f46e5);
      color: white; border: none; border-radius: 10px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      transition: all 0.2s; letter-spacing: 0.3px;
      box-shadow: 0 4px 16px rgba(99,102,241,0.4);
    }
    .login-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(99,102,241,0.5);
    }
    .alert-error {
      background: rgba(239,68,68,0.15); border: 1px solid rgba(239,68,68,0.3);
      color: #fca5a5; padding: 10px 14px; border-radius: 10px;
      font-size: 13px; margin-bottom: 18px;
    }
    .login-footer {
      text-align: center; font-size: 12px; color: #475569; margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="login-wrap">
    <div class="login-brand">
      <div class="icon">🎓</div>
      <h1>Alumni Tracker</h1>
      <p>TU Affiliated College — BCA Department</p>
    </div>

    <div class="login-card">
      {% with messages = get_flashed_messages() %}
        {% if messages %}
          {% for message in messages %}
            <div class="alert-error">⚠ {{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="POST">
        <label>Student ID</label>
        <input type="text" name="student_id" placeholder="e.g. BCA2020001" required>
        <label>Phone Number (Password)</label>
        <input type="password" name="phone" placeholder="Your registered phone number" required>
        <button type="submit" class="login-btn">Sign In →</button>
      </form>
    </div>

    <div class="login-footer">
      Use your Student ID and registered phone number to login
    </div>
  </div>
</body>
</html>
