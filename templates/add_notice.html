<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Post Notice — Alumni Tracker</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
</head>
<body>

<nav class="navbar">
  <a href="/dashboard" class="brand">Alumni <span>Tracker</span></a>

  <div class="nav-links">
    <a href="/notices">← Back to Notices</a>
    <button class="dark-toggle" onclick="toggleDark()" id="darkBtn">🌙</button>
    <a href="/logout" class="danger">Logout</a>
  </div>
</nav>

<div class="container-sm">
  <div class="page-header">
    <h2>Post a Notice</h2>
    <p>This notice will be visible to all alumni</p>
  </div>

  <div class="card">
    <form method="POST">
      <div class="form-group">
        <label>Notice Title *</label>
        <input type="text" name="title" placeholder="e.g. Alumni Meet 2025 — Save the Date" required>
      </div>
      <div class="form-group">
        <label>Content *</label>
        <textarea name="content" placeholder="Write the full notice content here..." required
                  style="min-height:160px;"></textarea>
      </div>
      <div class="form-group">
        <label>Options</label>
        <div style="display:flex;align-items:center;gap:10px;background:#f8fafc;
                    border:1.5px solid #e2e8f0;border-radius:10px;padding:12px 16px;">
          <input type="checkbox" name="is_pinned" id="pin"
                 style="width:16px;height:16px;cursor:pointer;accent-color:#6366f1;">
          <div>
            <div style="font-size:14px;color:#0f172a;font-weight:500;">📌 Pin this notice</div>
            <div style="font-size:12px;color:#94a3b8;">Pinned notices always appear first</div>
          </div>
        </div>
      </div>
      <div style="display:flex;gap:12px;">
        <button type="submit" class="btn btn-primary">📋 Post Notice</button>
        <a href="/notices" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</div>
<script src="/static/js/main.js"></script>
</body>
</html>
