<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <title>Create Poll — Alumni Tracker</title>
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    .option-input {
      display: flex; gap: 8px; margin-bottom: 10px; align-items: center;
    }
    .option-input input {
      flex: 1; padding: 10px 14px; border: 1.5px solid #e2e8f0;
      border-radius: 10px; font-size: 14px; outline: none; font-family: inherit;
      transition: border-color 0.2s;
    }
    .option-input input:focus { border-color: #6366f1; }
    .remove-opt {
      background: none; border: none; color: #94a3b8;
      font-size: 18px; cursor: pointer; padding: 4px;
      transition: color 0.15s;
    }
    .remove-opt:hover { color: #ef4444; }
    .add-option-btn {
      background: none; border: 1.5px dashed #e2e8f0; color: #94a3b8;
      padding: 10px; border-radius: 10px; width: 100%; font-size: 13px;
      cursor: pointer; transition: all 0.15s; font-family: inherit;
    }
    .add-option-btn:hover { border-color: #6366f1; color: #6366f1; }
  </style>
</head>
<body>
<nav class="navbar">
  <a href="/dashboard" class="brand">Alumni <span>Tracker</span></a>
  <div class="nav-links">
    <a href="/polls">← Back to Polls</a>
    <button class="dark-toggle" onclick="toggleDark()" id="darkBtn">🌙</button>
    <a href="/logout" class="danger">Logout</a>
  </div>
</nav>

<div class="container-sm">
  <div class="page-header">
    <h2>📊 Create a Poll</h2>
    <p>Ask alumni a question and collect their votes</p>
  </div>

  {% with messages = get_flashed_messages() %}
    {% if messages %}{% for m in messages %}
      <div class="alert alert-error">⚠️ {{ m }}</div>
    {% endfor %}{% endif %}
  {% endwith %}

  <div class="card">
    <form method="POST" id="pollForm">
      <div class="form-group">
        <label>Poll Question *</label>
        <input type="text" name="question"
               placeholder="e.g. What sector are you planning to work in?"
               required>
      </div>

      <div class="form-group">
        <label>Options * (minimum 2)</label>
        <div id="optionsContainer">
          <div class="option-input">
            <input type="text" name="options" placeholder="Option 1" required>
            <button type="button" class="remove-opt" onclick="removeOption(this)">✕</button>
          </div>
          <div class="option-input">
            <input type="text" name="options" placeholder="Option 2" required>
            <button type="button" class="remove-opt" onclick="removeOption(this)">✕</button>
          </div>
        </div>
        <button type="button" class="add-option-btn" onclick="addOption()">
          + Add another option
        </button>
      </div>

      <div style="display:flex;gap:12px;margin-top:8px;">
        <button type="submit" class="btn btn-primary">📊 Create Poll</button>
        <a href="/polls" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</div>

<script src="/static/js/main.js"></script>
<script>
let optCount = 2;

function addOption() {
  optCount++;
  const container = document.getElementById('optionsContainer');
  const div = document.createElement('div');
  div.className = 'option-input';
  div.innerHTML = `
    <input type="text" name="options" placeholder="Option ${optCount}">
    <button type="button" class="remove-opt" onclick="removeOption(this)">✕</button>
  `;
  container.appendChild(div);
}

function removeOption(btn) {
  const options = document.querySelectorAll('.option-input');
  if (options.length <= 2) {
    alert('You need at least 2 options.');
    return;
  }
  btn.parentElement.remove();
}
</script>
</body>
</html>
